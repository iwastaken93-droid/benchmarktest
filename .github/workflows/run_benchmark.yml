name: Hourly NIM Performance Benchmark
on:
  workflow_dispatch: # Triggered via Cloudflare Worker cron, dashboard trigger clicks, or manually from GitHub UI

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install tiktoken

      - name: Run Evaluator
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python -u test_models.py

      - name: Run Quick Test
        if: always()
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python -u quick_test.py

      - name: Commit and Push Results
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/benchmark_results.json
          git commit -m "Update benchmark and quick test metrics [skip ci]" || exit 0
          git pull --rebase origin master
          git push origin master
