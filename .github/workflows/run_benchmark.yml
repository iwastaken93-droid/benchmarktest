name: Hourly NIM Performance Benchmark
on:
  schedule:
    - cron: '29 * * * *' # Runs every hour (using minute 29 to avoid peak top-of-hour congestion on GitHub Actions)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Evaluator
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python -u nim_server.py --run-once

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/benchmark_results.json
          git commit -m "Update benchmark metrics [skip ci]" || exit 0
          git pull --rebase origin master
          git push origin master
